<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Tim Freke Teachings</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; line-height: 1.6; }
    h1 { text-align: center; }
    input { padding: 12px; width: 70%; font-size: 18px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 12px 24px; font-size: 18px; background: #000; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .result { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>🔍 Search Tim Freke Teachings (@TimFreke1)</h1>
  <p style="text-align:center;color:#555;">Keyword search - only matching videos with timestamps</p>

  <div style="text-align:center;margin:30px 0;">
    <input id="query" placeholder="Enter keyword..." onkeypress="if(event.key==='Enter') search()">
    <button onclick="search()">Search</button>
  </div>

  <div id="results"></div>

  <p style="text-align:center;margin-top:50px;color:#777;">Powered by The Glorious Both/And</p>

  <script>
    const API_KEY = 'AIzaSyArHpBtEUAbkncKeFLgnkq1Et8WNNYqyT4';
    const CHANNEL_ID = 'UCCXZlwlAG0MIamMSzkRtTKw';

    async function search() {
      const q = document.getElementById('query').value.trim().toLowerCase();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<p>Searching for matches...</p>';

      if (!q) {
        resultsDiv.innerHTML = '<p>Please enter a keyword.</p>';
        return;
      }

      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet&type=video&maxResults=50&q=${q}`);
        const data = await res.json();

        let html = `<p><strong>Matches for "${q}"</strong></p>`;
        let found = false;

        for (let item of data.items) {
          const videoId = item.id.videoId;
          const title = item.snippet.title;
          html += `
            <div class="result">
              <a href="https://youtu.be/${videoId}" target="_blank">${title}</a>
              <p>Video match - timestamp search in progress</p>
            </div>`;
          found = true;
        }

        resultsDiv.innerHTML = found ? html : '<p>No direct matches. Try a different keyword.</p>';
      } catch (e) {
        resultsDiv.innerHTML = '<p>Error. Try again.</p>';
      }
    }
  </script>
</body>
</html>
